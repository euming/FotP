project: cross-model-agent-swarm
description: >
  Enable simultaneous multi-model agent execution across Claude and Codex (OpenAI),
  where Codex runs in Linux containers. Three pillars:
  (1) Fix ams_common.py so the Rust kernel binary is found on Linux (no .exe extension).
  (2) Fix Codex skills so they use ./scripts/ams instead of scripts\ams.bat on Linux.
  (3) Add a Codex agent driver to run-swarm-plan.py so the orchestrator can spawn
      both Claude and Codex workers in the same swarm run.
  All five nodes are independent leaf tasks with no inter-dependencies.

nodes:
  - title: 01-fix-linux-binary-detection
    description: >
      Fix `scripts/ams_common.py` so the Rust `ams-core-kernel` binary is located
      correctly on Linux containers, and so the default AMS command label shows the
      right wrapper for the current platform.

      ## Files to change
      `scripts/ams_common.py`

      ## Changes required

      ### 1. Platform-aware RUST_AMS_EXE constant
      The current line:
        RUST_AMS_EXE = RUST_AMS_KERNEL_DIR / "target" / "release" / "ams-core-kernel.exe"
      is Windows-only. Replace it with two constants and make
      `build_rust_ams_cmd` check both:

      ```python
      import sys as _sys
      RUST_AMS_EXE_WIN   = RUST_AMS_KERNEL_DIR / "target" / "release" / "ams-core-kernel.exe"
      RUST_AMS_EXE_LINUX = RUST_AMS_KERNEL_DIR / "target" / "release" / "ams-core-kernel"
      ```

      In `build_rust_ams_cmd`, check `RUST_AMS_EXE_WIN` first (preserves existing
      Windows behaviour), then `RUST_AMS_EXE_LINUX`, then fall through to `cargo run`:

      ```python
      def build_rust_ams_cmd(*args: str) -> list[str] | None:
          if RUST_AMS_EXE_WIN.exists():
              return [str(RUST_AMS_EXE_WIN), *args]
          if RUST_AMS_EXE_LINUX.exists():
              return [str(RUST_AMS_EXE_LINUX), *args]
          cargo_toml = RUST_AMS_KERNEL_DIR / "Cargo.toml"
          if cargo_toml.exists():
              return ["cargo", "run", "--release", "--", *args]
          return None
      ```

      ### 2. Platform-aware DEFAULT_AMS_MEMORY_CMD
      The current line:
        DEFAULT_AMS_MEMORY_CMD = r"scripts\ams.bat"
      is used only for display in `memory_command_label()` (the actual invocation
      goes through `build_ams_wrapper_cmd` which is already platform-aware). Change:

      ```python
      DEFAULT_AMS_MEMORY_CMD = (
          r"scripts\ams.bat" if _sys.platform == "win32" else "./scripts/ams"
      )
      ```

      ### 3. Remove stale RUST_AMS_EXE references
      After adding the two new constants, remove or replace any remaining references
      to the old `RUST_AMS_EXE` name anywhere in ams_common.py so the file
      remains consistent.

      ## Acceptance
      - `python scripts/ams.py --help` must still succeed on Windows after the change.
      - A grep for `RUST_AMS_EXE` (the old single name) should return no matches in
        ams_common.py after the rename.

  - title: 02-fix-codex-skill-linux-compat
    description: >
      Update the Codex skill files so agents in Linux containers are given
      Unix-compatible commands, not Windows-style `scripts\ams.bat` paths.

      ## Files to change

      ### codex-skills/ams/SKILL.md
      The file currently only shows Windows commands. Add a Unix block after
      the Windows block so that:
      - The Windows block is labelled `Windows:`
      - A new `Unix/container:` block follows, showing `./scripts/ams <verb>`
        equivalents for every command in the Windows block.
      Keep the existing structure and rules sections intact.

      ### codex-skills/ams/agents/openai.yaml
      The `default_prompt` field currently says:
        "Use the repo AMS wrapper for memory lookup. Start with scripts\ams.bat search, ..."
      Change it to be platform-neutral:
        "Use the repo AMS wrapper for memory lookup. On Windows: `scripts\ams.bat search \"<keywords>\"`. On Linux/container: `./scripts/ams search \"<keywords>\"`. Then use thread, handoff, sessions, or read as needed."

      ### codex-skills/ams/references/cli-map.md
      The file shows only Windows commands. Add a Unix/container block under each
      verb section (search, read, sessions, thread, handoff, callstack, swarm-plan,
      ke, cache, atlas) showing the equivalent `./scripts/ams <verb>` form.
      Keep the existing content — just append the Unix equivalents.

      ## Acceptance
      - All three files must contain `./scripts/ams` as a command example.
      - The Windows paths must still be present (not removed).

  - title: 03-add-codex-agent-driver
    description: >
      Add a `codex` agent driver to `scripts/run-swarm-plan.py` so the orchestrator
      can spawn Codex workers in addition to (or instead of) Claude workers.

      ## Design

      The existing `_spawn_agent(node_info, team)` method hard-codes Claude:
        cmd = ["claude", "-p", prompt, "--permission-mode", "bypassPermissions",
               "--output-format", "stream-json", "--verbose"]
      We need a new `--agent-driver` CLI flag (similar to `--team-model`) and a
      branching path inside `_spawn_agent`.

      ## Changes required in run-swarm-plan.py

      ### 1. Add DEFAULT_TEAM_DRIVERS constant (near DEFAULT_TEAM_MODELS, line ~62)
      ```python
      # Default agent driver per team.  "claude" = claude CLI; "codex" = codex CLI.
      # Override at runtime with --agent-driver worker=codex  (repeatable flag).
      DEFAULT_TEAM_DRIVERS: dict[str, str] = {
          "worker":             "claude",
          "verifier":           "claude",
          "repairer":           "claude",
          "bug-reporter":       "claude",
          "bugreport-repairer": "claude",
          "decomposer":         "claude",
          "planner":            "claude",
          "reviewer":           "claude",
      }
      ```

      ### 2. Parse --agent-driver flag in Orchestrator.__init__ and parse_args
      In `parse_args()`, add the following alongside `--team-model` and `--team-effort`:
      ```python
      parser.add_argument(
          "--agent-driver", metavar="TEAM=DRIVER", action="append", default=[],
          help="Override agent driver for a team. E.g. --agent-driver worker=codex",
      )
      ```
      In `Orchestrator.__init__`, add:
      ```python
      self.team_drivers: dict[str, str] = {**DEFAULT_TEAM_DRIVERS}
      if team_drivers:
          self.team_drivers.update(team_drivers)
      ```
      Add `team_drivers: dict[str, str] | None = None` to `__init__` signature.
      In `main()`, parse `--agent-driver` the same way as `--team-model` is parsed
      and pass it to `Orchestrator(team_drivers=team_drivers_dict)`.

      ### 3. Branch in _spawn_agent based on driver
      After the prompt is built but before the process is spawned (~line 1496):

      ```python
      driver = self.team_drivers.get(team, "claude")
      if driver == "codex":
          cmd = _build_codex_cmd(prompt)
      else:
          cmd = ["claude", "-p", prompt, "--permission-mode", "bypassPermissions",
                 "--output-format", "stream-json", "--verbose"]
          model = self.team_models.get(team)
          if model:
              cmd.extend(["--model", model])
          effort = self.team_efforts.get(team)
          if effort:
              cmd.extend(["--effort", effort])
      ```

      ### 4. Add _build_codex_cmd helper (near _spawn_agent)
      ```python
      def _build_codex_cmd(prompt: str) -> list[str]:
          """Build the command list to spawn a Codex agent non-interactively."""
          # codex CLI: https://github.com/openai/codex
          # -q = quiet (no interactive prompts), --full-auto = approve all tool calls
          return ["codex", "--full-auto", "-q", prompt]
      ```

      ### 5. Skip StreamParser for Codex agents
      The `StreamParser` is designed for Claude's `--output-format stream-json`.
      For Codex agents, output is plain text. After the driver branch, wrap the
      `StreamParser` construction in a conditional:

      ```python
      if driver != "codex":
          stream_parser = StreamParser(process.stdout, agent_status)
          stream_parser.start()
      else:
          stream_parser = None
      ```
      When `stream_parser` is None, the existing code that calls
      `handle.get_stdout()` still works because `AgentHandle.get_stdout()` reads
      directly from `process.stdout` when `stream_parser` is None — confirm this
      is already the case; if not, add the fallback.

      ### 6. Error handling
      In the `except FileNotFoundError` block, add a message for Codex:
      ```python
      except FileNotFoundError:
          if driver == "codex":
              self.log(f"ERROR: 'codex' CLI not found. Install the OpenAI Codex CLI.")
          else:
              self.log(f"ERROR: 'claude' CLI not found. Install Claude Code.")
          claimed_tasks_detach(claim_key)
          return None
      ```

      ## Acceptance
      - `python scripts/run-swarm-plan.py --help` must list `--agent-driver`.
      - `python scripts/run-swarm-plan.py --dry-run run` must succeed without error.
      - Grep for `DEFAULT_TEAM_DRIVERS` must return a hit in run-swarm-plan.py.

  - title: 04-fix-get-stdout-for-codex
    description: >
      Ensure `AgentHandle.get_stdout()` works correctly when `stream_parser` is None
      (i.e., for Codex agents whose output is plain text, not Claude stream-json).

      ## Context
      `AgentHandle` in `run-swarm-plan.py` (class definition around line 1328) stores
      a `stream_parser: StreamParser | None` and a `process: subprocess.Popen`.
      The `get_stdout()` method is used by the orchestrator to read completed agent
      output. Currently it likely reads from `stream_parser.get_text()` or
      `process.stdout.read()`.

      ## Task
      1. Read the current `AgentHandle.get_stdout()` implementation.
      2. If it already falls back to `process.stdout.read()` / `process.communicate()`
         when `stream_parser` is None, verify this is correct and add a comment
         confirming Codex compatibility.
      3. If it does NOT have a fallback, add one:
         ```python
         def get_stdout(self) -> str:
             if self.stream_parser is not None:
                 return self.stream_parser.get_text()
             # Plain-text path (e.g. Codex agents that don't use stream-json)
             if self.process.stdout:
                 try:
                     return self.process.stdout.read()
                 except Exception:
                     pass
             return ""
         ```
      4. Similarly check `AgentHandle.get_stderr()` and add the same plain-text
         fallback if missing.

      ## Acceptance
      - `AgentHandle.get_stdout()` must not assume `stream_parser` is non-None.
      - `python scripts/run-swarm-plan.py --dry-run run` must succeed.

    depends_on: 03-add-codex-agent-driver

  - title: 05-write-cross-model-howto
    description: >
      Write a short how-to guide explaining how to run a cross-model swarm with
      both Claude and Codex workers.

      ## File to create
      `docs/agent-memory-tools.md` already covers the AMS commands. Create a NEW
      file: `docs/cross-model-swarm-howto.md`

      ## Contents

      The document must cover:

      ### 1. Prerequisites
      - Claude Code CLI installed (for Claude workers)
      - OpenAI Codex CLI installed: `npm install -g @openai/codex` (for Codex workers)
      - Codex CLI configured with an API key
      - Python 3.x and (optionally) Rust/Cargo for the `ams-core-kernel` binary

      ### 2. How the cross-model swarm works
      Brief architecture: orchestrator runs on Windows, spawns Claude workers locally
      and Codex workers in Linux containers. Both share the same swarm-plan store
      and AMS memory because Codex containers receive a mounted copy of the repo
      (or access it via the filesystem path configured in the Codex sandbox).
      Codex containers use `./scripts/ams` (the Unix shell wrapper) rather than
      `scripts\ams.bat`.

      ### 3. Running a plan with Codex workers
      Show the concrete command to route the `worker` team to Codex:
      ```bash
      python scripts/run-swarm-plan.py run \
        --agent-driver worker=codex \
        --team-model verifier=claude-haiku-4-5-20251001
      ```
      Explain: verifiers, repairers, and bug-reporters stay on Claude because they
      need access to the local swarm-plan state. Only `worker` (the task-executing
      role) is routed to Codex.

      ### 4. Mixing models
      Show how to run some workers on Codex and keep the rest on Claude:
      ```bash
      python scripts/run-swarm-plan.py run \
        --agent-driver worker=codex \
        --agent-driver repairer=claude
      ```

      ### 5. Linux binary note
      Mention that Codex containers need either:
      a) A pre-built `rust/ams-core-kernel/target/release/ams-core-kernel` (Linux ELF), OR
      b) Rust/Cargo installed in the container so `cargo run --release` can build it on first use.
      The ams_common.py fix (node 01) handles detection; the user must supply the binary.

      ### 6. Troubleshooting
      - "codex not found": install `@openai/codex` npm package
      - "ams-core-kernel not found": run `cargo build --release` inside `rust/ams-core-kernel/`
        on a Linux machine and copy the resulting binary to the same path in the repo
      - Windows-style paths in Codex container: verify `DEFAULT_AMS_MEMORY_CMD` fix was applied

      ## Acceptance
      - File `docs/cross-model-swarm-howto.md` exists.
      - File contains `--agent-driver` at least once.
      - File contains `./scripts/ams` at least once.
